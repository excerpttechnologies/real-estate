<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="sky2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="60%" style="stop-color:#7dd3fc"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
    <linearGradient id="pool" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="villa-wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fefce8"/>
      <stop offset="100%" style="stop-color:#fef9c3"/>
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect width="800" height="600" fill="url(#sky2)"/>
  
  <!-- Sun -->
  <circle cx="650" cy="80" r="50" fill="#fbbf24" opacity="0.9"/>
  <circle cx="650" cy="80" r="65" fill="#fbbf24" opacity="0.2"/>
  
  <!-- Clouds -->
  <ellipse cx="200" cy="100" rx="60" ry="25" fill="white" opacity="0.8"/>
  <ellipse cx="230" cy="90" rx="45" ry="20" fill="white" opacity="0.9"/>
  <ellipse cx="500" cy="130" rx="50" ry="20" fill="white" opacity="0.6"/>
  
  <!-- Grass/ground -->
  <rect x="0" y="350" width="800" height="250" fill="#22c55e"/>
  <rect x="0" y="350" width="800" height="20" fill="#16a34a"/>
  
  <!-- Villa main structure -->
  <rect x="200" y="180" width="400" height="200" fill="url(#villa-wall)"/>
  <rect x="200" y="180" width="400" height="200" stroke="#d4a574" stroke-width="2" fill="none"/>
  
  <!-- Roof -->
  <polygon points="180,180 400,80 620,180" fill="#dc2626"/>
  <polygon points="180,180 400,80 620,180" fill="none" stroke="#b91c1c" stroke-width="2"/>
  
  <!-- Second floor windows -->
  <rect x="280" y="200" width="60" height="70" rx="3" fill="#bfdbfe"/>
  <rect x="280" y="200" width="60" height="70" rx="3" stroke="#94a3b8" stroke-width="2" fill="none"/>
  <line x1="310" y1="200" x2="310" y2="270" stroke="#94a3b8" stroke-width="1.5"/>
  
  <rect x="460" y="200" width="60" height="70" rx="3" fill="#bfdbfe"/>
  <rect x="460" y="200" width="60" height="70" rx="3" stroke="#94a3b8" stroke-width="2" fill="none"/>
  <line x1="490" y1="200" x2="490" y2="270" stroke="#94a3b8" stroke-width="1.5"/>
  
  <!-- Door -->
  <rect x="365" y="280" width="70" height="100" rx="5" fill="#78350f"/>
  <rect x="365" y="280" width="70" height="100" rx="5" stroke="#92400e" stroke-width="2" fill="none"/>
  <circle cx="420" cy="335" r="4" fill="#fbbf24"/>
  
  <!-- Balcony -->
  <rect x="345" y="200" width="110" height="8" fill="#d4a574"/>
  <rect x="350" y="208" width="4" height="50" fill="#d4a574"/>
  <rect x="380" y="208" width="4" height="50" fill="#d4a574"/>
  <rect x="410" y="208" width="4" height="50" fill="#d4a574"/>
  <rect x="440" y="208" width="4" height="50" fill="#d4a574"/>
  <rect x="345" y="255" width="110" height="6" fill="#d4a574"/>
  
  <!-- Garage -->
  <rect x="550" y="290" width="100" height="90" rx="3" fill="#f5f5f4"/>
  <rect x="555" y="295" width="90" height="80" fill="#a8a29e"/>
  <line x1="570" y1="295" x2="570" y2="375" stroke="#78716c" stroke-width="1"/>
  <line x1="585" y1="295" x2="585" y2="375" stroke="#78716c" stroke-width="1"/>
  <line x1="600" y1="295" x2="600" y2="375" stroke="#78716c" stroke-width="1"/>
  <line x1="615" y1="295" x2="615" y2="375" stroke="#78716c" stroke-width="1"/>
  <line x1="630" y1="295" x2="630" y2="375" stroke="#78716c" stroke-width="1"/>
  
  <!-- Pool -->
  <rect x="50" y="400" width="200" height="100" rx="20" fill="url(#pool)"/>
  <rect x="50" y="400" width="200" height="100" rx="20" stroke="#0e7490" stroke-width="3" fill="none"/>
  <!-- Pool water ripples -->
  <path d="M80,440 Q100,430 120,440 Q140,450 160,440 Q180,430 200,440" fill="none" stroke="white" stroke-width="1" opacity="0.4"/>
  <path d="M90,460 Q110,450 130,460 Q150,470 170,460 Q190,450 210,460" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  
  <!-- Pool deck -->
  <rect x="40" y="390" width="220" height="15" rx="3" fill="#d6d3d1"/>
  
  <!-- Trees -->
  <rect x="120" y="260" width="12" height="90" fill="#78350f"/>
  <circle cx="126" cy="240" r="40" fill="#16a34a"/>
  <circle cx="110" cy="255" r="30" fill="#15803d"/>
  <circle cx="145" cy="250" r="28" fill="#22c55e"/>
  
  <rect x="680" y="280" width="10" height="70" fill="#78350f"/>
  <circle cx="685" cy="260" r="35" fill="#16a34a"/>
  <circle cx="670" cy="275" r="25" fill="#15803d"/>
  <circle cx="705" cy="270" r="22" fill="#22c55e"/>
  
  <!-- Path/driveway -->
  <path d="M400,380 L400,500 Q400,520 390,530 L350,580 L450,580 L410,530 Q400,520 400,500 Z" fill="#d6d3d1"/>
  
  <!-- Bushes -->
  <ellipse cx="250" cy="378" rx="25" ry="15" fill="#15803d"/>
  <ellipse cx="550" cy="378" rx="25" ry="15" fill="#15803d"/>
  <ellipse cx="300" cy="378" rx="20" ry="12" fill="#22c55e"/>
  <ellipse cx="500" cy="378" rx="20" ry="12" fill="#22c55e"/>
  
  <!-- Sun lounger by pool -->
  <rect x="270" y="430" width="50" height="15" rx="3" fill="#f59e0b"/>
  <rect x="270" y="428" width="15" height="20" rx="3" fill="#f59e0b" transform="rotate(-30,270,438)"/>
</svg>
