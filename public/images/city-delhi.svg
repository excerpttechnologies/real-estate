<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1067" viewBox="0 0 800 1067">
  <defs>
    <linearGradient id="delhi-sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0369a1"/>
      <stop offset="40%" style="stop-color:#38bdf8"/>
      <stop offset="70%" style="stop-color:#7dd3fc"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
    <linearGradient id="monument" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574"/>
      <stop offset="100%" style="stop-color:#92400e"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="1067" fill="url(#delhi-sky)"/>
  
  <!-- Clouds -->
  <ellipse cx="200" cy="100" rx="80" ry="30" fill="white" opacity="0.7"/>
  <ellipse cx="240" cy="90" rx="60" ry="25" fill="white" opacity="0.8"/>
  <ellipse cx="600" cy="150" rx="70" ry="25" fill="white" opacity="0.6"/>
  
  <!-- Ground / lawn -->
  <rect x="0" y="700" width="800" height="367" fill="#22c55e"/>
  <rect x="0" y="700" width="800" height="30" fill="#16a34a"/>
  
  <!-- India Gate inspired monument -->
  <!-- Main arch -->
  <rect x="300" y="300" width="200" height="400" fill="url(#monument)"/>
  <!-- Arch opening -->
  <path d="M340,700 L340,500 Q400,420 460,500 L460,700 Z" fill="#38bdf8" opacity="0.5"/>
  <!-- Top structure -->
  <rect x="280" y="280" width="240" height="30" fill="#b45309"/>
  <rect x="290" y="260" width="220" height="25" fill="#d4a574"/>
  <rect x="360" y="220" width="80" height="45" fill="#b45309"/>
  <rect x="370" y="200" width="60" height="25" fill="#d4a574"/>
  
  <!-- Pillars -->
  <rect x="300" y="300" width="30" height="400" fill="#b45309" opacity="0.7"/>
  <rect x="470" y="300" width="30" height="400" fill="#b45309" opacity="0.7"/>
  
  <!-- Pathway -->
  <polygon points="340,700 460,700 550,1067 250,1067" fill="#d6d3d1"/>
  <line x1="400" y1="700" x2="400" y2="1067" stroke="#a8a29e" stroke-width="1" opacity="0.3"/>
  
  <!-- Trees flanking -->
  <rect x="120" y="550" width="15" height="150" fill="#78350f"/>
  <circle cx="127" cy="520" r="50" fill="#16a34a"/>
  <circle cx="110" cy="540" r="35" fill="#22c55e"/>
  <circle cx="150" cy="535" r="30" fill="#15803d"/>
  
  <rect x="650" y="550" width="15" height="150" fill="#78350f"/>
  <circle cx="657" cy="520" r="50" fill="#16a34a"/>
  <circle cx="640" cy="540" r="35" fill="#22c55e"/>
  <circle cx="680" cy="535" r="30" fill="#15803d"/>
  
  <!-- Gurgaon skyline in background -->
  <rect x="0" y="500" width="50" height="200" fill="#94a3b8" opacity="0.3"/>
  <rect x="60" y="480" width="40" height="220" fill="#94a3b8" opacity="0.25"/>
  <rect x="700" y="490" width="45" height="210" fill="#94a3b8" opacity="0.3"/>
  <rect x="750" y="510" width="50" height="190" fill="#94a3b8" opacity="0.25"/>
  
  <!-- Reflecting pool -->
  <rect x="320" y="740" width="160" height="80" rx="5" fill="#38bdf8" opacity="0.4"/>
  <path d="M330,770 Q370,760 410,770 Q450,780 470,770" fill="none" stroke="white" stroke-width="0.8" opacity="0.4"/>
  
  <!-- Text -->
  <text x="400" y="900" font-family="system-ui,sans-serif" font-size="48" font-weight="700" fill="#1e293b" text-anchor="middle" opacity="0.9">DELHI NCR</text>
  <text x="400" y="950" font-family="system-ui,sans-serif" font-size="20" fill="#374151" text-anchor="middle" opacity="0.6">9,870+ Properties</text>
</svg>
