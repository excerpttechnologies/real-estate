<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#92400e"/>
      <stop offset="100%" style="stop-color:#78350f"/>
    </linearGradient>
    <linearGradient id="window-sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7dd3fc"/>
      <stop offset="100%" style="stop-color:#bae6fd"/>
    </linearGradient>
    <linearGradient id="sofa" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
  </defs>
  
  <!-- Walls -->
  <rect width="800" height="600" fill="url(#wall)"/>
  
  <!-- Floor -->
  <polygon points="0,420 800,420 800,600 0,600" fill="url(#floor)"/>
  <line x1="0" y1="420" x2="800" y2="420" stroke="#d4a574" stroke-width="3"/>
  
  <!-- Floor planks -->
  <line x1="100" y1="420" x2="50" y2="600" stroke="#78350f" stroke-width="0.5" opacity="0.3"/>
  <line x1="250" y1="420" x2="200" y2="600" stroke="#78350f" stroke-width="0.5" opacity="0.3"/>
  <line x1="400" y1="420" x2="380" y2="600" stroke="#78350f" stroke-width="0.5" opacity="0.3"/>
  <line x1="550" y1="420" x2="560" y2="600" stroke="#78350f" stroke-width="0.5" opacity="0.3"/>
  <line x1="700" y1="420" x2="730" y2="600" stroke="#78350f" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Large window -->
  <rect x="250" y="60" width="300" height="280" rx="5" fill="url(#window-sky)"/>
  <rect x="250" y="60" width="300" height="280" rx="5" stroke="#94a3b8" stroke-width="4" fill="none"/>
  <line x1="400" y1="60" x2="400" y2="340" stroke="#94a3b8" stroke-width="3"/>
  <line x1="250" y1="200" x2="550" y2="200" stroke="#94a3b8" stroke-width="3"/>
  
  <!-- Clouds in window -->
  <ellipse cx="320" cy="120" rx="30" ry="15" fill="white" opacity="0.8"/>
  <ellipse cx="340" cy="115" rx="25" ry="12" fill="white" opacity="0.8"/>
  <ellipse cx="480" cy="140" rx="25" ry="12" fill="white" opacity="0.6"/>
  
  <!-- Curtains -->
  <rect x="230" y="50" width="30" height="310" fill="#e2e8f0" opacity="0.7"/>
  <rect x="540" y="50" width="30" height="310" fill="#e2e8f0" opacity="0.7"/>
  <rect x="230" y="45" width="350" height="15" rx="3" fill="#94a3b8"/>
  
  <!-- Sofa -->
  <rect x="150" y="370" width="350" height="80" rx="15" fill="url(#sofa)"/>
  <rect x="160" y="350" width="330" height="30" rx="10" fill="#2563eb"/>
  <rect x="145" y="350" width="40" height="100" rx="10" fill="#1e3a8a"/>
  <rect x="465" y="350" width="40" height="100" rx="10" fill="#1e3a8a"/>
  
  <!-- Cushions -->
  <ellipse cx="230" cy="375" rx="30" ry="20" fill="#fbbf24"/>
  <ellipse cx="420" cy="375" rx="30" ry="20" fill="#f87171"/>
  
  <!-- Side table -->
  <rect x="560" y="380" width="60" height="50" rx="5" fill="#78350f"/>
  <rect x="555" y="375" width="70" height="8" rx="3" fill="#92400e"/>
  
  <!-- Lamp on table -->
  <rect x="583" y="310" width="6" height="65" fill="#d4a574"/>
  <path d="M565,310 L600,310 L586,270 Z" fill="#fef3c7"/>
  <ellipse cx="586" cy="310" rx="20" ry="5" fill="#fef3c7" opacity="0.5"/>
  
  <!-- Picture frame on wall -->
  <rect x="80" y="120" width="100" height="130" rx="3" stroke="#78350f" stroke-width="4" fill="none"/>
  <rect x="88" y="128" width="84" height="114" fill="#86efac" opacity="0.5"/>
  <path d="M88,200 L120,170 L145,190 L172,150 L172,242 L88,242 Z" fill="#22c55e" opacity="0.6"/>
  
  <!-- Rug -->
  <ellipse cx="325" cy="500" rx="200" ry="60" fill="#fbbf24" opacity="0.3"/>
  <ellipse cx="325" cy="500" rx="170" ry="50" fill="#f59e0b" opacity="0.2"/>
  
  <!-- Plant -->
  <rect x="670" y="380" width="20" height="40" rx="3" fill="#78350f"/>
  <circle cx="680" cy="360" r="30" fill="#22c55e"/>
  <circle cx="670" cy="345" r="20" fill="#16a34a"/>
  <circle cx="695" cy="350" r="18" fill="#15803d"/>
  
  <!-- Light overlay -->
  <rect width="800" height="600" fill="white" opacity="0.05"/>
</svg>
