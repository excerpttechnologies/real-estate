  <rect x="1620" y="540" width="80" height="540" fill="#1f2937" opacity="0.7"/>
  <rect x="1750" y="470" width="100" height="610" fill="#1f2937" opacity="0.6"/>
  
  <!-- Mid buildings -->
  <rect x="450" y="380" width="120" height="700" fill="url(#building1)"/>
  <rect x="600" y="300" width="140" height="780" fill="url(#building2)"/>
  <rect x="780" y="350" width="100" height="730" fill="url(#building1)"/>
