<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="40%" style="stop-color:#1e293b"/>
      <stop offset="70%" style="stop-color:#334155"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="building1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#374151"/>
      <stop offset="100%" style="stop-color:#1f2937"/>
    </linearGradient>
    <linearGradient id="building2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4b5563"/>
      <stop offset="100%" style="stop-color:#374151"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect width="1920" height="1080" fill="url(#sky)"/>
  
  <!-- Stars -->
  <circle cx="200" cy="80" r="1.5" fill="#e2e8f0" opacity="0.6"/>
  <circle cx="450" cy="120" r="1" fill="#e2e8f0" opacity="0.4"/>
  <circle cx="700" cy="60" r="1.5" fill="#e2e8f0" opacity="0.7"/>
  <circle cx="900" cy="150" r="1" fill="#e2e8f0" opacity="0.5"/>
  <circle cx="1100" cy="90" r="1.5" fill="#e2e8f0" opacity="0.6"/>
  <circle cx="1350" cy="50" r="1" fill="#e2e8f0" opacity="0.4"/>
  <circle cx="1550" cy="130" r="1.5" fill="#e2e8f0" opacity="0.5"/>
  <circle cx="1700" cy="70" r="1" fill="#e2e8f0" opacity="0.7"/>
  <circle cx="300" cy="200" r="1" fill="#e2e8f0" opacity="0.3"/>
  <circle cx="1200" cy="180" r="1" fill="#e2e8f0" opacity="0.4"/>
  
  <!-- Moon -->
  <circle cx="1600" cy="180" r="40" fill="#fef3c7" opacity="0.9"/>
  <circle cx="1610" cy="170" r="35" fill="url(#sky)"/>
  
  <!-- City glow -->
  <ellipse cx="960" cy="1080" rx="900" ry="400" fill="url(#glow)"/>
  
  <!-- Far buildings -->
  <rect x="100" y="550" width="80" height="530" fill="#1f2937" opacity="0.7"/>
  <rect x="200" y="480" width="100" height="600" fill="#1f2937" opacity="0.6"/>
  <rect x="350" y="520" width="70" height="560" fill="#1f2937" opacity="0.7"/>
