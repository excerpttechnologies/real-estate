<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1067" viewBox="0 0 800 1067">
  <defs>
    <linearGradient id="blr-sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="50%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#bfdbfe"/>
    </linearGradient>
    <linearGradient id="glass-tower" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.7"/>
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:0.6"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="1067" fill="url(#blr-sky)"/>
  
  <!-- Clouds -->
  <ellipse cx="250" cy="120" rx="90" ry="30" fill="white" opacity="0.7"/>
  <ellipse cx="290" cy="110" rx="65" ry="25" fill="white" opacity="0.8"/>
  <ellipse cx="550" cy="80" rx="70" ry="25" fill="white" opacity="0.6"/>
  
  <!-- Parkland / green areas -->
  <rect x="0" y="650" width="800" height="417" fill="#22c55e"/>
  <ellipse cx="200" cy="670" rx="200" ry="30" fill="#16a34a"/>
  <ellipse cx="600" cy="680" rx="180" ry="25" fill="#16a34a"/>
  
  <!-- IT Park glass buildings -->
  <rect x="100" y="300" width="100" height="370" fill="url(#glass-tower)"/>
  <rect x="100" y="300" width="100" height="370" stroke="#2563eb" stroke-width="2" fill="none"/>
  <!-- Windows -->
  <g opacity="0.5">
    <rect x="110" y="310" width="30" height="25" fill="#bfdbfe"/>
    <rect x="160" y="310" width="30" height="25" fill="#bfdbfe"/>
    <rect x="110" y="350" width="30" height="25" fill="#bfdbfe"/>
    <rect x="160" y="350" width="30" height="25" fill="#bfdbfe"/>
    <rect x="110" y="390" width="30" height="25" fill="#bfdbfe"/>
    <rect x="160" y="390" width="30" height="25" fill="#bfdbfe"/>
    <rect x="110" y="430" width="30" height="25" fill="#bfdbfe"/>
    <rect x="160" y="430" width="30" height="25" fill="#bfdbfe"/>
    <rect x="110" y="470" width="30" height="25" fill="#bfdbfe"/>
    <rect x="160" y="470" width="30" height="25" fill="#bfdbfe"/>
    <rect x="110" y="510" width="30" height="25" fill="#bfdbfe"/>
    <rect x="160" y="510" width="30" height="25" fill="#bfdbfe"/>
  </g>
  
  <!-- Taller tower -->
  <rect x="250" y="200" width="120" height="470" fill="url(#glass-tower)"/>
  <rect x="250" y="200" width="120" height="470" stroke="#2563eb" stroke-width="2" fill="none"/>
  <g opacity="0.5">
    <rect x="260" y="210" width="40" height="30" fill="#bfdbfe"/>
    <rect x="320" y="210" width="40" height="30" fill="#bfdbfe"/>
    <rect x="260" y="260" width="40" height="30" fill="#bfdbfe"/>
    <rect x="320" y="260" width="40" height="30" fill="#bfdbfe"/>
    <rect x="260" y="310" width="40" height="30" fill="#bfdbfe"/>
    <rect x="320" y="310" width="40" height="30" fill="#bfdbfe"/>
    <rect x="260" y="360" width="40" height="30" fill="#bfdbfe"/>
    <rect x="320" y="360" width="40" height="30" fill="#bfdbfe"/>
    <rect x="260" y="410" width="40" height="30" fill="#bfdbfe"/>
    <rect x="320" y="410" width="40" height="30" fill="#bfdbfe"/>
    <rect x="260" y="460" width="40" height="30" fill="#bfdbfe"/>
    <rect x="320" y="460" width="40" height="30" fill="#bfdbfe"/>
    <rect x="260" y="510" width="40" height="30" fill="#bfdbfe"/>
    <rect x="320" y="510" width="40" height="30" fill="#bfdbfe"/>
    <rect x="260" y="560" width="40" height="30" fill="#bfdbfe"/>
    <rect x="320" y="560" width="40" height="30" fill="#bfdbfe"/>
  </g>
  
  <!-- Third tower -->
  <rect x="430" y="250" width="110" height="420" fill="url(#glass-tower)"/>
  <rect x="430" y="250" width="110" height="420" stroke="#2563eb" stroke-width="2" fill="none"/>
  <g opacity="0.5">
    <rect x="440" y="260" width="35" height="28" fill="#bfdbfe"/>
    <rect x="495" y="260" width="35" height="28" fill="#bfdbfe"/>
    <rect x="440" y="305" width="35" height="28" fill="#bfdbfe"/>
    <rect x="495" y="305" width="35" height="28" fill="#bfdbfe"/>
    <rect x="440" y="350" width="35" height="28" fill="#bfdbfe"/>
    <rect x="495" y="350" width="35" height="28" fill="#bfdbfe"/>
    <rect x="440" y="395" width="35" height="28" fill="#bfdbfe"/>
    <rect x="495" y="395" width="35" height="28" fill="#bfdbfe"/>
    <rect x="440" y="440" width="35" height="28" fill="#bfdbfe"/>
    <rect x="495" y="440" width="35" height="28" fill="#bfdbfe"/>
    <rect x="440" y="485" width="35" height="28" fill="#bfdbfe"/>
    <rect x="495" y="485" width="35" height="28" fill="#bfdbfe"/>
    <rect x="440" y="530" width="35" height="28" fill="#bfdbfe"/>
    <rect x="495" y="530" width="35" height="28" fill="#bfdbfe"/>
  </g>
  
  <!-- Smaller tower -->
  <rect x="600" y="350" width="90" height="320" fill="url(#glass-tower)"/>
  <rect x="600" y="350" width="90" height="320" stroke="#2563eb" stroke-width="2" fill="none"/>
  
  <!-- Lush trees (garden city) -->
  <rect x="50" y="580" width="12" height="90" fill="#78350f"/>
  <circle cx="56" cy="560" r="40" fill="#16a34a"/>
  <circle cx="40" cy="575" r="30" fill="#22c55e"/>
  <circle cx="75" cy="570" r="28" fill="#15803d"/>
  
  <rect x="380" y="580" width="10" height="90" fill="#78350f"/>
  <circle cx="385" cy="560" r="35" fill="#16a34a"/>
  <circle cx="370" cy="575" r="25" fill="#22c55e"/>
  <circle cx="405" cy="570" r="23" fill="#15803d"/>
  
  <rect x="550" y="580" width="10" height="90" fill="#78350f"/>
  <circle cx="555" cy="560" r="35" fill="#16a34a"/>
  <circle cx="540" cy="575" r="25" fill="#22c55e"/>
  <circle cx="575" cy="570" r="22" fill="#15803d"/>
  
  <rect x="720" y="560" width="12" height="110" fill="#78350f"/>
  <circle cx="726" cy="540" r="40" fill="#16a34a"/>
  <circle cx="710" cy="555" r="30" fill="#22c55e"/>
  <circle cx="745" cy="550" r="28" fill="#15803d"/>
  
  <!-- Extra greenery -->
  <ellipse cx="150" cy="660" rx="50" ry="20" fill="#16a34a" opacity="0.6"/>
  <ellipse cx="450" cy="665" rx="40" ry="18" fill="#15803d" opacity="0.6"/>
  <ellipse cx="650" cy="660" rx="45" ry="20" fill="#16a34a" opacity="0.6"/>
  
  <!-- Road -->
  <rect x="0" y="750" width="800" height="40" fill="#4b5563"/>
  <line x1="0" y1="770" x2="800" y2="770" stroke="#fbbf24" stroke-width="2" stroke-dasharray="20,15"/>
  
  <!-- Text -->
  <text x="400" y="880" font-family="system-ui,sans-serif" font-size="48" font-weight="700" fill="#1e293b" text-anchor="middle" opacity="0.9">BANGALORE</text>
  <text x="400" y="930" font-family="system-ui,sans-serif" font-size="20" fill="#374151" text-anchor="middle" opacity="0.6">8,540+ Properties</text>
  <text x="400" y="970" font-family="system-ui,sans-serif" font-size="14" fill="#16a34a" text-anchor="middle" opacity="0.5">Garden City of India</text>
</svg>
