<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="blue-sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#93c5fd"/>
    </linearGradient>
    <linearGradient id="concrete" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e5e7eb"/>
      <stop offset="100%" style="stop-color:#d1d5db"/>
    </linearGradient>
    <linearGradient id="glass-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.4"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="600" fill="url(#blue-sky)"/>
  
  <!-- Clouds -->
  <ellipse cx="150" cy="80" rx="70" ry="25" fill="white" opacity="0.8"/>
  <ellipse cx="180" cy="70" rx="50" ry="20" fill="white" opacity="0.9"/>
  <ellipse cx="600" cy="100" rx="60" ry="22" fill="white" opacity="0.7"/>
  <ellipse cx="630" cy="90" rx="45" ry="18" fill="white" opacity="0.8"/>
  
  <!-- Distant buildings -->
  <rect x="0" y="350" width="80" height="250" fill="#94a3b8" opacity="0.4"/>
  <rect x="100" y="380" width="60" height="220" fill="#94a3b8" opacity="0.3"/>
  <rect x="650" y="360" width="70" height="240" fill="#94a3b8" opacity="0.4"/>
  <rect x="740" y="390" width="60" height="210" fill="#94a3b8" opacity="0.3"/>
  
  <!-- Main building (new construction) -->
  <rect x="220" y="120" width="360" height="480" fill="url(#concrete)"/>
  
  <!-- Glass facade -->
  <g>
    <!-- Row 1 -->
    <rect x="240" y="140" width="70" height="50" fill="url(#glass-blue)"/>
    <rect x="325" y="140" width="70" height="50" fill="url(#glass-blue)"/>
    <rect x="410" y="140" width="70" height="50" fill="url(#glass-blue)"/>
    <rect x="495" y="140" width="70" height="50" fill="url(#glass-blue)"/>
    
    <!-- Row 2 -->
    <rect x="240" y="205" width="70" height="50" fill="url(#glass-blue)"/>
    <rect x="325" y="205" width="70" height="50" fill="url(#glass-blue)"/>
    <rect x="410" y="205" width="70" height="50" fill="url(#glass-blue)"/>
    <rect x="495" y="205" width="70" height="50" fill="url(#glass-blue)"/>
    
    <!-- Row 3 -->
    <rect x="240" y="270" width="70" height="50" fill="url(#glass-blue)"/>
    <rect x="325" y="270" width="70" height="50" fill="url(#glass-blue)"/>
    <rect x="410" y="270" width="70" height="50" fill="url(#glass-blue)"/>
    <rect x="495" y="270" width="70" height="50" fill="url(#glass-blue)"/>
    
    <!-- Row 4 -->
    <rect x="240" y="335" width="70" height="50" fill="url(#glass-blue)"/>
    <rect x="325" y="335" width="70" height="50" fill="url(#glass-blue)"/>
    <rect x="410" y="335" width="70" height="50" fill="url(#glass-blue)"/>
    <rect x="495" y="335" width="70" height="50" fill="url(#glass-blue)"/>
    
    <!-- Row 5 -->
    <rect x="240" y="400" width="70" height="50" fill="url(#glass-blue)"/>
    <rect x="325" y="400" width="70" height="50" fill="url(#glass-blue)"/>
    <rect x="410" y="400" width="70" height="50" fill="url(#glass-blue)"/>
    <rect x="495" y="400" width="70" height="50" fill="url(#glass-blue)"/>
    
    <!-- Row 6 -->
    <rect x="240" y="465" width="70" height="50" fill="url(#glass-blue)"/>
    <rect x="325" y="465" width="70" height="50" fill="url(#glass-blue)"/>
    <rect x="410" y="465" width="70" height="50" fill="url(#glass-blue)"/>
    <rect x="495" y="465" width="70" height="50" fill="url(#glass-blue)"/>
    
    <!-- Row 7 (under construction - some missing) -->
    <rect x="240" y="530" width="70" height="50" fill="url(#glass-blue)" opacity="0.5"/>
    <rect x="325" y="530" width="70" height="50" fill="url(#glass-blue)" opacity="0.3"/>
  </g>
  
  <!-- Crane -->
  <rect x="560" y="30" width="8" height="570" fill="#f59e0b"/>
  <rect x="460" y="30" width="200" height="8" fill="#f59e0b"/>
  <line x1="564" y1="38" x2="500" y2="80" stroke="#f59e0b" stroke-width="3"/>
  <line x1="564" y1="38" x2="630" y2="80" stroke="#f59e0b" stroke-width="3"/>
  <!-- Crane cable -->
  <line x1="480" y1="38" x2="480" y2="200" stroke="#78716c" stroke-width="1.5"/>
  <rect x="470" y="200" width="20" height="15" fill="#f59e0b"/>
  
  <!-- Construction scaffolding -->
  <rect x="220" y="500" width="360" height="100" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
  <line x1="300" y1="500" x2="300" y2="600" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
  <line x1="400" y1="500" x2="400" y2="600" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
  <line x1="500" y1="500" x2="500" y2="600" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
  <line x1="220" y1="550" x2="580" y2="550" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
  
  <!-- NEW LAUNCH banner -->
  <rect x="250" y="80" width="200" height="40" rx="5" fill="#dc2626"/>
  <text x="350" y="107" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">NEW LAUNCH</text>
  
  <!-- Ground -->
  <rect x="0" y="580" width="800" height="20" fill="#78716c"/>
  
  <!-- Trees -->
  <rect x="160" y="510" width="8" height="70" fill="#78350f"/>
  <circle cx="164" cy="490" r="30" fill="#16a34a"/>
  <circle cx="150" cy="500" r="22" fill="#22c55e"/>
  
  <rect x="630" y="510" width="8" height="70" fill="#78350f"/>
  <circle cx="634" cy="490" r="30" fill="#16a34a"/>
  <circle cx="648" cy="500" r="22" fill="#22c55e"/>
</svg>
