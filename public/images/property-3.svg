<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="office-wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f5f9"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="office-floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8"/>
      <stop offset="100%" style="stop-color:#64748b"/>
    </linearGradient>
    <linearGradient id="glass-wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bfdbfe;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:0.5"/>
    </linearGradient>
  </defs>
  
  <!-- Ceiling -->
  <rect width="800" height="600" fill="url(#office-wall)"/>
  
  <!-- Floor -->
  <polygon points="0,400 800,400 800,600 0,600" fill="url(#office-floor)"/>
  
  <!-- Floor tiles -->
  <line x1="0" y1="400" x2="800" y2="400" stroke="#78716c" stroke-width="1" opacity="0.3"/>
  <line x1="160" y1="400" x2="80" y2="600" stroke="#78716c" stroke-width="0.5" opacity="0.2"/>
  <line x1="320" y1="400" x2="280" y2="600" stroke="#78716c" stroke-width="0.5" opacity="0.2"/>
  <line x1="480" y1="400" x2="480" y2="600" stroke="#78716c" stroke-width="0.5" opacity="0.2"/>
  <line x1="640" y1="400" x2="680" y2="600" stroke="#78716c" stroke-width="0.5" opacity="0.2"/>
  
  <!-- Glass partition wall -->
  <rect x="300" y="80" width="200" height="320" fill="url(#glass-wall)"/>
  <rect x="300" y="80" width="200" height="320" stroke="#60a5fa" stroke-width="2" fill="none"/>
  <line x1="400" y1="80" x2="400" y2="400" stroke="#93c5fd" stroke-width="1.5"/>
  
  <!-- Window wall (back) -->
  <rect x="0" y="50" width="800" height="30" fill="#4b5563"/>
  <rect x="30" y="80" width="230" height="200" fill="#bfdbfe" opacity="0.5"/>
  <rect x="540" y="80" width="230" height="200" fill="#bfdbfe" opacity="0.5"/>
  <!-- Window frames -->
  <line x1="145" y1="80" x2="145" y2="280" stroke="#94a3b8" stroke-width="2"/>
  <line x1="655" y1="80" x2="655" y2="280" stroke="#94a3b8" stroke-width="2"/>
  
  <!-- Desk 1 -->
  <rect x="60" y="340" width="160" height="10" rx="2" fill="#1e293b"/>
  <rect x="70" y="350" width="6" height="50" fill="#374151"/>
  <rect x="206" y="350" width="6" height="50" fill="#374151"/>
  
  <!-- Monitor on desk 1 -->
  <rect x="110" y="290" width="70" height="50" rx="3" fill="#1e293b"/>
  <rect x="115" y="295" width="60" height="40" fill="#3b82f6"/>
  <rect x="140" y="340" width="15" height="10" fill="#374151"/>
  <rect x="130" y="348" width="35" height="3" rx="1" fill="#374151"/>
  
  <!-- Keyboard -->
  <rect x="100" y="330" width="50" height="12" rx="2" fill="#374151"/>
  
  <!-- Office chair 1 -->
  <ellipse cx="140" cy="420" rx="30" ry="10" fill="#1e293b"/>
  <rect x="130" y="380" width="20" height="40" rx="5" fill="#374151"/>
  <rect x="125" y="370" width="30" height="15" rx="5" fill="#1e293b"/>
  
  <!-- Desk 2 -->
  <rect x="560" y="340" width="160" height="10" rx="2" fill="#1e293b"/>
  <rect x="570" y="350" width="6" height="50" fill="#374151"/>
  <rect x="706" y="350" width="6" height="50" fill="#374151"/>
  
  <!-- Monitor on desk 2 -->
  <rect x="610" y="290" width="70" height="50" rx="3" fill="#1e293b"/>
  <rect x="615" y="295" width="60" height="40" fill="#22c55e"/>
  <rect x="640" y="340" width="15" height="10" fill="#374151"/>
  <rect x="630" y="348" width="35" height="3" rx="1" fill="#374151"/>
  
  <!-- Office chair 2 -->
  <ellipse cx="640" cy="420" rx="30" ry="10" fill="#1e293b"/>
  <rect x="630" y="380" width="20" height="40" rx="5" fill="#374151"/>
  <rect x="625" y="370" width="30" height="15" rx="5" fill="#1e293b"/>
  
  <!-- Conference table (through glass) -->
  <rect x="330" y="250" width="140" height="60" rx="5" fill="#78350f" opacity="0.7"/>
  
  <!-- Ceiling lights -->
  <rect x="100" y="50" width="100" height="6" rx="2" fill="white" opacity="0.9"/>
  <rect x="350" y="50" width="100" height="6" rx="2" fill="white" opacity="0.9"/>
  <rect x="600" y="50" width="100" height="6" rx="2" fill="white" opacity="0.9"/>
  
  <!-- Plant -->
  <rect x="510" y="360" width="12" height="35" rx="3" fill="#78350f"/>
  <circle cx="516" cy="345" r="20" fill="#22c55e"/>
  <circle cx="508" cy="335" r="15" fill="#16a34a"/>
  <circle cx="526" cy="340" r="14" fill="#15803d"/>
  
  <!-- Whiteboard -->
  <rect x="30" y="100" width="10" height="150" rx="2" fill="white" opacity="0.8"/>
  
  <!-- Clock -->
  <circle cx="400" cy="60" r="0" fill="none"/>
</svg>
